# UnCRtainTS evaluation config — Brazil biome test subset
checkpoint: results/uncrtaints/uncrtaints_brazil/best.pth.tar
output_json: results/uncrtaints/uncrtaints_brazil/eval_metrics.json

batch_size: 4
num_workers: 4

data:
  test_json:  /home/emanuel.pires/Projeto/allclear/metadata/datasets/test_tx3_s2-s1_100pct_ama-cer-pan.json
  data_root:  /home/emanuel.pires/Projeto/allclear/data
  tx: 3

# Must match training config exactly
model:
  model: uncrtaints
  encoder_widths: "[128]"
  decoder_widths: "[128,128,128,128,128]"
  out_conv: "[13]"
  mean_nonLinearity: true
  var_nonLinearity: softplus
  agg_mode: att_group
  encoder_norm: group
  decoder_norm: batch
  block_type: mbconv
  padding_mode: reflect
  pad_value: 0.0
  n_head: 16
  d_model: 256
  positional_encoding: true
  d_k: 4
  low_res_size: 32
  use_v: false
  loss: MGNLL
  covmode: diag
  chunk_size: null
  scale_by: 1.0
  separate_out: false
  use_sar: false
  pretrain: false
  input_t: 3
  ref_date: "2022-01-01"
  sample_type: cloudy_cloudfree
  vary_samples: false
  profile: false
  gamma: 1.0
